name: Build and Deploy to AWS EC2

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

env:
  AWS_REGION: ap-south-1
  JAVA_VERSION: '17'
  TF_DIR: infrastructure/environments/dev
  S3_BUCKET: petclinic-deploy-633426742056
  APP_NAME: spring-petclinic

jobs:
  # -----------------------------------------------------------------------
  # JOB 1: Build & Test
  # -----------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.build-jar.outputs.jar_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'adopt'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        id: build-jar
        run: |
          ./mvnw -B package -DskipTests --no-transfer-progress
          JAR_FILE=$(ls target/spring-petclinic-*.jar | head -1)
          JAR_NAME=$(basename $JAR_FILE)
          echo "jar_name=${JAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "Built: ${JAR_NAME}"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/spring-petclinic-*.jar
          retention-days: 7

  # -----------------------------------------------------------------------
  # JOB 2: Security Scan (SCA + IaC)
  # -----------------------------------------------------------------------
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'adopt'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Generate dependency tree
        run: ./mvnw -B dependency:tree --no-transfer-progress

      - name: Run Trivy - Dependency Scan (SCA)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy - IaC Misconfiguration Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

  # -----------------------------------------------------------------------
  # JOB 3: Deploy JAR to EC2 via S3 + SSM
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to EC2 (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: dev

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-jar
          path: ./target

      - name: Create S3 deploy bucket (if not exists)
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          JAR_FILE=$(ls target/spring-petclinic-*.jar | head -1)
          aws s3 cp "$JAR_FILE" "s3://${{ env.S3_BUCKET }}/releases/${{ env.APP_NAME }}.jar"
          aws s3 cp "$JAR_FILE" "s3://${{ env.S3_BUCKET }}/releases/${{ env.APP_NAME }}-${{ github.sha }}.jar"
          echo "Uploaded to s3://${{ env.S3_BUCKET }}/releases/${{ env.APP_NAME }}.jar"

      - name: Get EC2 instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=petclinic-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Target EC2: ${INSTANCE_ID}"

      - name: Deploy JAR via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo \"=== Deploying PetClinic JAR from S3 ===\"",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/releases/${{ env.APP_NAME }}.jar /opt/petclinic/app.jar",
              "echo \"Stopping petclinic service...\"",
              "systemctl stop petclinic || true",
              "echo \"Updating JAR reference in systemd...\"",
              "sed -i \"s|ExecStart=.*|ExecStart=/usr/bin/java -Xmx512m -jar /opt/petclinic/app.jar --server.port=8080|\" /etc/systemd/system/petclinic.service",
              "systemctl daemon-reload",
              "echo \"Starting petclinic service...\"",
              "systemctl start petclinic",
              "sleep 10",
              "systemctl is-active petclinic && echo \"petclinic: RUNNING\" || echo \"petclinic: FAILED\"",
              "echo \"=== Deploy complete $(date) ===\""
            ]' \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: ${COMMAND_ID}"

          # Wait for command to complete
          echo "Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" || true

          # Get command output
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query "[Status, StandardOutputContent]" \
            --output text

      - name: Verify application health
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names petclinic-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "Checking http://${ALB_DNS}/"
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://${ALB_DNS}/" 2>/dev/null || echo "000")
            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "✅ Application healthy — HTTP ${HTTP_STATUS} (attempt ${i}/30)"
              exit 0
            fi
            echo "  attempt ${i}/30 — HTTP ${HTTP_STATUS}, waiting 10s..."
            sleep 10
          done
          echo "❌ Application did not return HTTP 200 after 5 minutes"
          exit 1

      - name: Print deployment summary
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance | ${{ steps.ec2.outputs.instance_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JAR | ${{ needs.build.outputs.jar_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
